services:
  cpa-usage-keeper:
    image: ghcr.io/willxup/cpa-usage-keeper:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_DB_PATH: /data/app.db
      APP_PORT: 8080
      APP_BASE_PATH: ""
      AUTH_ENABLED: "false"
      LOGIN_PASSWORD: replace-with-your-login-password
      AUTH_SESSION_TTL: 168h
    volumes:
      - ./data/app.db:/data/app.db:ro
